<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>Connexion admin</title>
<style>
  :root{
    --bg:#0f1115;
    --panel:#171a21;
    --border:#262b36;
    --text:#e9ecf1;
    --muted:#8a90a0;
    --accent:#4f7cff;
    --danger:#ff6b6b;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    background:var(--bg);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    color:var(--text);
  }
  .card{
    width:100%;
    max-width:360px;
    background:var(--panel);
    border:1px solid var(--border);
    border-radius:14px;
    padding:32px 28px;
    box-shadow:0 20px 50px rgba(0,0,0,.35);
  }
  .card h1{
    font-size:1.15rem;
    margin:0 0 4px;
    font-weight:600;
  }
  .card p.sub{
    margin:0 0 24px;
    color:var(--muted);
    font-size:.85rem;
  }
  label{
    display:block;
    font-size:.8rem;
    color:var(--muted);
    margin-bottom:6px;
  }
  input[type="password"]{
    width:100%;
    padding:11px 12px;
    border-radius:8px;
    border:1px solid var(--border);
    background:#0d0f14;
    color:var(--text);
    font-size:.95rem;
    outline:none;
  }
  input[type="password"]:focus{
    border-color:var(--accent);
  }
  button{
    width:100%;
    margin-top:18px;
    padding:11px 12px;
    border:none;
    border-radius:8px;
    background:var(--accent);
    color:#fff;
    font-size:.95rem;
    font-weight:600;
    cursor:pointer;
  }
  button:hover{ filter:brightness(1.08); }
  .erreur{
    margin:14px 0 0;
    padding:10px 12px;
    border-radius:8px;
    background:rgba(255,107,107,.12);
    border:1px solid rgba(255,107,107,.3);
    color:var(--danger);
    font-size:.85rem;
  }
</style>
</head>
<body>
  <div class="card">
    <h1>Espace admin</h1>
    <p class="sub">Connecte-toi pour voir les demandes reçues sur le site.</p>
    <form method="POST" autocomplete="off">
      <label for="mot_de_passe">Mot de passe</label>
      <input type="password" id="mot_de_passe" name="mot_de_passe" required autofocus>
      <button type="submit">Se connecter</button>
    </form>
    {% if erreur %}
      <div class="erreur">{{ erreur }}</div>
    {% endif %}
  </div>
</body>
</html>
